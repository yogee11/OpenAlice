name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [dev, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm test

  # The full Vitest suite includes path, port-binding, process-launch, and
  # packaged-toolchain behavior whose semantics differ materially by host OS.
  # Ubuntu remains the build gate above; this matrix prevents a Linux-only
  # green check from shipping regressions to macOS or Windows users.
  cross-platform-test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
        timeout-minutes: 15

      - run: pnpm test
        timeout-minutes: 15

  # Boots the real `pnpm dev` stack and asserts UTA/Alice/Vite all spawn.
  # Exists to catch cross-platform spawn regressions (e.g. `spawn tsx ENOENT`
  # on Windows) that `pnpm test` can't see — esbuild transpiles, it never
  # spawns the children. Runs on Windows (the at-risk OS) plus Ubuntu as a
  # control: if Windows goes red while Ubuntu stays green, it's a real platform
  # diff, not a harness bug. See scripts/guardian/smoke.ts.
  dev-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Skip the Electron desktop shell — the smoke only needs UTA/Alice/UI,
      # and this avoids a large electron download on the Windows runner.
      - run: pnpm install --frozen-lockfile --filter='!@traderalice/desktop'

      # Exercises duplicate-start rejection, graceful takeover, crash-stale
      # reclamation, heartbeat renewal, and forced recovery with real child
      # processes before the heavier full-stack boot smoke.
      - run: pnpm test:guardian-recovery
        timeout-minutes: 3

      - run: pnpm test:smoke
        timeout-minutes: 8
